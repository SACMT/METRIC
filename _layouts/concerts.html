<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">

{% seo %}
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" as="style" type="text/css" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("details .md").forEach(function (el) {
          el.innerHTML = marked.parse(el.textContent);
        });
      });
    </script>
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>

    <header class="page-header" role="banner">
      <div class="logo-container">
        <a href="https://metricimpro.eu/"><img src="logo_big.png" alt="METRIC Logo" class="header-logo"></a>
        <a href="https://www.mh-luebeck.de/de"><img src="prefix__g19.png" alt="MHL" class="header-logo"></a>
        <div class="logo-stacked">
          <a href="https://eu.daad.de/de/"><img src="DE_Kofinanziert von der Europäischen Union_POS.jpg" alt="EU Logo" class="header-logo"></a>
          <a href="https://eu.daad.de/de/"><img src="EN_Co-funded by the EU_POS.jpg" alt="EU Logo" class="header-logo"></a>
        </div>
      </div>
      <!-- <h1 class="project-name">{{ page.title | default: site.title | default: site.github.repository_name }}</h1> -->
      <!-- <h1 class="project-name">METRIC</h1> -->
      <h2 class="project-tagline">{{ page.description | default: site.description | default: site.github.project_tagline }}</h2>
      <!-- <a href="" class="btn">Events</a> -->
      <!-- <a href="" class="btn">Assignments</a> -->
      
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
      </footer>
    </main>
  </body>
</html>
